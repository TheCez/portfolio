services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db_debug
    restart: always
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_password
      POSTGRES_DB: portfolio_db
    ports:
      - "5433:5432" # Exposed to host specifically for local debugging (GUI db viewers)
    volumes:
      - pgdata_debug:/var/lib/postgresql/data
    networks:
      - default

  minio:
    image: minio/minio:latest
    container_name: portfolio_minio_debug
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_debug:/data
    networks:
      - default

  portfolio:
    build: .
    container_name: portfolio_website_debug
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@db:5432/portfolio_db?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local_debug_secret_key_123
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: portfolio-media
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      # FACTORY_RESET: "true"  # ⚠️ Uncomment to wipe ALL data on next restart. Re-comment after reset!
    networks:
      - default

volumes:
  pgdata_debug:
  minio_data_debug:
