services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_password
      POSTGRES_DB: portfolio_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_backups:/backups
      - ./scripts/restore-latest-backup.sh:/docker-entrypoint-initdb.d/restore-latest-backup.sh:ro
    networks:
      - portfolio

  minio:
    image: minio/minio:latest
    container_name: portfolio_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    networks:
      - portfolio

  db-backup:
    image: postgres:15-alpine
    container_name: portfolio_db_backup
    restart: always
    depends_on:
      - db
    environment:
      PGPASSWORD: portfolio_password
    volumes:
      - ./db_backups:/backups
    networks:
      - portfolio
    entrypoint: |
      sh -c '
      echo "0 3 * * * pg_dump -h db -U portfolio_user portfolio_db > /backups/portfolio_db_\$$(date +\%Y\%m\%d_\%H\%M\%S).sql" > /etc/crontabs/root
      crond -f -d 8
      '

  portfolio:
    build: .
    container_name: portfolio_website
    restart: always
    expose:
      - "3000"
    depends_on:
      - db
      - minio
    volumes:
      - ./runtime:/app/runtime
    environment:
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@db:5432/portfolio_db?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: portfolio-media
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      FACTORY_RESET: ${FACTORY_RESET:-false}
    networks:
      - portfolio
      - setup_npm

networks:
  portfolio:
  setup_npm:
    external: true

volumes:
  pgdata:
